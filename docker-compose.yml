services:
  mongo:
    image: mongo:7-jammy
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    # Not exposed externally — only the backend can reach it
    networks:
      - internal

  backend:
    build: ./vyrix-backend-sample
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      MONGO_URI: mongodb://mongo:27017/vyrix
      # These must be set in your shell or a root-level .env file before running:
      JWT_SECRET: ${JWT_SECRET}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      CLIENT_URL: ${CLIENT_URL:-http://localhost:80}
      BREVO_API_KEY: ${BREVO_API_KEY:-}
      BREVO_SENDER: ${BREVO_SENDER:-}
      FEEDBACK_EMAIL: ${FEEDBACK_EMAIL:-}
      IMAGEKIT_PRIVATE_KEY: ${IMAGEKIT_PRIVATE_KEY:-}
      SUPABASE_URL: ${SUPABASE_URL:-}
      SUPABASE_SERVICE_KEY: ${SUPABASE_SERVICE_KEY:-}
    depends_on:
      - mongo
    networks:
      - internal
      - external

  frontend:
    build:
      context: ./vyrix-frontend-sample
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:3000}
        VITE_GOOGLE_CLIENT_ID: ${VITE_GOOGLE_CLIENT_ID:-}
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - external

volumes:
  mongo_data:

networks:
  internal:
  external:
